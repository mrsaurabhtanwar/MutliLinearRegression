name: CI/CD pipeline with the MultipleLinearRegression

on:
  push:
    branches:
        - main
  pull_request:
    branches:
        - main

jobs:
    test:
      runs-on: ubuntu-latest
      steps:
        - name: checkout code
          uses: actions/checkout@v3

        - name: setup python
          uses: actions/setup-python@v4
          with:
            python-version: "3.11"
        
        - name: install dependencies
          run: |
            python -m pip install --upgrade pip
            pip install -r requirements.txt
            
        - name: Run tests
          run: |
            python -c "import joblib; print('All import successfully!')"

    build-and-publish:
      needs: test
      runs-on: ubuntu-latest
      steps:
        - name: setup Docker buildx
          uses: docker/setup-buildx-action@v2

        - name: Docker login
          uses: docker/login-action@v2
          with:
            username: ${{ secrets.DOCKER_USERNAME }}
            password: ${{ secrets.DOCKER_PASSWORD }}
        
        - name: build and push image
          uses: docker/build-push-action@v4
          with:
            context: .
            file: Dockerfile
            push: true
            tags: ${{ secrets.DOCKER_USERNAME }}/house-price-predection:latest